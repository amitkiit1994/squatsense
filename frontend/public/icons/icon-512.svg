<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#18181b"/>
  <!-- Squat figure silhouette -->
  <g transform="translate(256,240)" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-100" r="26" fill="#a78bfa"/>
    <!-- Torso (leaning slightly forward like a squat) -->
    <line x1="0" y1="-74" x2="-10" y2="0"/>
    <!-- Upper arms holding barbell -->
    <line x1="-10" y1="-52" x2="-62" y2="-62"/>
    <line x1="-10" y1="-52" x2="42" y2="-62"/>
    <!-- Barbell -->
    <line x1="-84" y1="-62" x2="64" y2="-62" stroke-width="10"/>
    <rect x="-100" y="-78" width="20" height="32" rx="4" fill="#a78bfa"/>
    <rect x="60" y="-78" width="20" height="32" rx="4" fill="#a78bfa"/>
    <!-- Hips -->
    <line x1="-10" y1="0" x2="-42" y2="10"/>
    <line x1="-10" y1="0" x2="26" y2="10"/>
    <!-- Upper legs (thighs parallel - squat position) -->
    <line x1="-42" y1="10" x2="-62" y2="42"/>
    <line x1="26" y1="10" x2="46" y2="42"/>
    <!-- Lower legs -->
    <line x1="-62" y1="42" x2="-52" y2="104"/>
    <line x1="46" y1="42" x2="36" y2="104"/>
    <!-- Feet -->
    <line x1="-52" y1="104" x2="-72" y2="110"/>
    <line x1="36" y1="104" x2="56" y2="110"/>
  </g>
  <!-- "SquatSense" text label -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#a78bfa">SquatSense</text>
</svg>
