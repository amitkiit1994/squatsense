<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="512" height="512">
  <rect width="192" height="192" rx="32" fill="#18181b" />
  <!-- Shield -->
  <path d="M96 20 L160 50 L160 110 Q160 150 96 175 Q32 150 32 110 L32 50 Z" fill="#1c1c20" stroke="#fb923c" stroke-width="2.5" opacity="0.9"/>
  <!-- Inner shield glow -->
  <path d="M96 30 L150 55 L150 108 Q150 142 96 165 Q42 142 42 108 L42 55 Z" fill="none" stroke="#fb923c" stroke-width="0.5" opacity="0.3"/>
  <!-- Pose figure in cyan -->
  <g transform="translate(96,100)" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-32" r="7" fill="#06b6d4" opacity="0.8"/>
    <!-- Torso -->
    <line x1="0" y1="-25" x2="-2" y2="-2"/>
    <!-- Arms -->
    <line x1="-2" y1="-18" x2="-18" y2="-22"/>
    <line x1="-2" y1="-18" x2="14" y2="-22"/>
    <!-- Hips -->
    <line x1="-2" y1="-2" x2="-12" y2="2"/>
    <line x1="-2" y1="-2" x2="8" y2="2"/>
    <!-- Upper legs -->
    <line x1="-12" y1="2" x2="-18" y2="14"/>
    <line x1="8" y1="2" x2="14" y2="14"/>
    <!-- Lower legs -->
    <line x1="-18" y1="14" x2="-15" y2="30"/>
    <line x1="14" y1="14" x2="11" y2="30"/>
    <!-- Feet -->
    <line x1="-15" y1="30" x2="-21" y2="32"/>
    <line x1="11" y1="30" x2="17" y2="32"/>
  </g>
  <!-- Orange arc gauge at bottom of shield -->
  <path d="M65 125 Q96 145 127 125" fill="none" stroke="#fb923c" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <!-- F³ text -->
  <text x="96" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#fb923c" letter-spacing="-1">F<tspan font-size="18" dy="-8">3</tspan></text>
</svg>
